name: Server images

# Build the notes backend images (sync + blobs) on every release tag (v*) —
# the same trigger as the web image and Android APK workflows, so every
# surface ships the same versioned commit. Watchtower on the server polls
# GHCR and redeploys automatically (see docs/Deploy.md §Notes backend).
#
# CREDENTIAL-FREE: no secrets are used or needed. Both services run authless
# behind the tailnet; the host Caddy proxies them same-origin.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [sync, blobs]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: server/${{ matrix.image }}
          push: true
          tags: |
            ghcr.io/carrein/mitsume-${{ matrix.image }}:latest
            ghcr.io/carrein/mitsume-${{ matrix.image }}:${{ github.ref_name }}
