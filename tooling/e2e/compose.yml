# Throwaway e2e stack (see run.sh for the one-command entry point).
#
# Mirrors production shape with ZERO real data: a disposable Radicale plus a
# same-origin Caddy on :8881 — the real dev proxy on :8880 keeps serving your
# actual calendar untouched.
#
#   http://localhost:8881/        → Metro dev server on the host
#   http://localhost:8881/dav/*   → test Radicale (this stack, anonymous volume)
#
# `docker compose down -v` wipes the test calendar completely.
name: mitsume-e2e

services:
  radicale:
    container_name: mitsume-e2e-radicale
    image: tomsquest/docker-radicale
    volumes:
      - ./radicale-config:/config/config:ro
      - /data # anonymous volume; run.sh always downs with -v so runs start empty

  e2e-proxy:
    container_name: mitsume-e2e-proxy
    image: caddy:2-alpine
    ports:
      - '8881:8881'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      # Lets the container reach the Mac (Metro on :8081), as in dev-proxy.
      - host.docker.internal:host-gateway
