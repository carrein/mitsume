# mitsume notes backend — NOT a standalone stack. These two services are
# merge-ready fragments for the HOST docker-compose.yml (the same stack that
# runs the `mitsume` web container); the host Caddy proxies them same-origin
# under the existing mitsume site block. Full instructions + Caddyfile
# snippet: docs/Deploy.md §Notes backend.
#
# Env vars to add to the server .env:
#   MITSUME_SYNC_VOLUME=...   host dir for the sync SQLite file (uid 1000 writable)
#   MITSUME_BLOBS_VOLUME=...  host dir for the image blobs (uid 1000 writable)
services:
  mitsume-sync:
    container_name: mitsume-sync
    image: ghcr.io/carrein/mitsume-sync:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - ${MITSUME_SYNC_VOLUME}:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:1234/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - com.centurylinklabs.watchtower.enable=true

  mitsume-blobs:
    container_name: mitsume-blobs
    image: ghcr.io/carrein/mitsume-blobs:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 64M
    volumes:
      - ${MITSUME_BLOBS_VOLUME}:/blobs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:8080/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - com.centurylinklabs.watchtower.enable=true
